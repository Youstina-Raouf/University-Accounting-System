<div class="payroll-container">
  <h2>Staff Payroll</h2>
  <p>Basic payroll scaffold (mock)</p>
  <table class="data-table">
    <thead>
      <tr><th>Name</th><th>Role</th><th>Salary</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of staff">
        <td>{{ s.name }}</td>
        <td>{{ s.role }}</td>
        <td>
          <div>{{ s.salary | currency }}</div>
          <div style="margin-top:6px; display:flex; gap:6px;">
            <input type="number" [(ngModel)]="s.allowances" class="small-input" placeholder="Allowances" />
            <input type="number" [(ngModel)]="s.deductions" class="small-input" placeholder="Deductions" />
            <div style="align-self:center; font-weight:600;">Net: {{ netPay(s) | currency }}</div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
  <div style="margin-top:12px; display:flex; gap:8px;">
    <button class="btn" (click)="payAll()">Process Payroll (mock)</button>
    <button class="btn" (click)="generateMonthlyReport()">Export Monthly Report (JSON)</button>
  </div>
</div>
