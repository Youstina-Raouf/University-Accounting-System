<div class="signup-container">
  <div class="bg-animation"></div>
  <div class="signup-card">
    <div class="logo">
      <i class="fas fa-user-plus"></i>
      <h1>Create Account</h1>
    </div>
    <p class="subtitle">Sign up to get started</p>
    
    <form (ngSubmit)="registerUser()" class="signup-form">
      <!-- Avatar upload -->
      <div class="form-group avatar-group">
        <label for="avatar">Profile Picture</label>
        <div class="avatar-row">
          <div class="avatar-preview" *ngIf="avatarPreview">
            <img [src]="avatarPreview" alt="avatar preview" />
          </div>
          <input id="avatar" type="file" accept="image/*" (change)="onAvatarSelected($event)" [disabled]="isLoading" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="firstname">First Name</label>
          <div class="input-with-icon">
            <i class="fas fa-user"></i>
            <input 
              id="firstname"
              type="text" 
              placeholder="Enter your first name" 
              [(ngModel)]="user.firstname" 
              name="firstname" 
              required
              class="form-input"
              autocomplete="given-name"
              [disabled]="isLoading"
            >
          </div>
        </div>
        
        <div class="form-group">
          <label for="lastname">Last Name</label>
          <div class="input-with-icon">
            <i class="fas fa-user"></i>
            <input 
              id="lastname"
              type="text" 
              placeholder="Enter your last name" 
              [(ngModel)]="user.lastname" 
              name="lastname" 
              required
              class="form-input"
              autocomplete="family-name"
              [disabled]="isLoading"
            >
          </div>
        </div>
      </div>
      
      <!-- Payment (mock) -->
      <div class="form-group">
        <label>Payment Method (optional)</label>
        <div class="input-with-icon">
          <i class="fas fa-credit-card"></i>
          <input id="cardNumber" type="text" placeholder="Card number (mock)" [(ngModel)]="user.cardNumber" name="cardNumber" class="form-input" [disabled]="isLoading">
        </div>
        <div class="form-row">
          <div class="form-group">
            <input id="cardExpiry" type="text" placeholder="MM/YY" [(ngModel)]="user.cardExpiry" name="cardExpiry" class="form-input" [disabled]="isLoading">
          </div>
          <div class="form-group">
            <input id="cardCvc" type="text" placeholder="CVC" [(ngModel)]="user.cardCvc" name="cardCvc" class="form-input" [disabled]="isLoading">
          </div>
        </div>
      </div>

      <!-- Preferences -->
      <div class="form-group">
        <label>Preferences</label>
        <div class="prefs">
          <label><input type="checkbox" [(ngModel)]="user.prefNewsletter" name="prefNewsletter"> Receive newsletter</label>
          <label><input type="checkbox" [(ngModel)]="user.prefNotifications" name="prefNotifications"> Email notifications</label>
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-with-icon">
          <i class="fas fa-envelope"></i>
          <input 
            id="email"
            type="email" 
            placeholder="Enter your email" 
            [(ngModel)]="user.email" 
            name="email" 
            required
            class="form-input"
            autocomplete="email"
            [disabled]="isLoading"
          >
        </div>
      </div>
      
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-with-icon">
          <i class="fas fa-at"></i>
          <input 
            id="username"
            type="text" 
            placeholder="Choose a username" 
            [(ngModel)]="user.username" 
            name="username" 
            required
            class="form-input"
            autocomplete="username"
            [disabled]="isLoading"
          >
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input 
              id="password"
              type="password" 
              placeholder="Create a password" 
              [(ngModel)]="user.password" 
              name="password" 
              required
              class="form-input"
              autocomplete="new-password"
              [disabled]="isLoading"
            >
          </div>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input 
              id="confirmPassword"
              type="password" 
              placeholder="Confirm your password" 
              [(ngModel)]="user.confirmPassword" 
              name="confirmPassword" 
              required
              class="form-input"
              autocomplete="new-password"
              [disabled]="isLoading"
            >
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label for="role">Role</label>
        <div class="select-with-icon">
          <i class="fas fa-user-tag"></i>
          <select 
            id="role"
            [(ngModel)]="user.role" 
            name="role" 
            required
            class="form-select"
            [disabled]="isLoading"
          >
            <option value="">Choose your role</option>
            <option value="admin">Admin</option>
            <option value="accounting">Accounting Personnel</option>
            <option value="student">Student</option>
          </select>
        </div>
      </div>
      
      <div *ngIf="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>
      
      <div *ngIf="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>
      
      <button type="submit" class="signup-button" [disabled]="isLoading">
        <span *ngIf="!isLoading">
          <i class="fas fa-user-plus"></i> Register
        </span>
        <span *ngIf="isLoading" class="spinner">
          <i class="fas fa-spinner fa-spin"></i> Creating account...
        </span>
      </button>
      
      <div class="footer-links">
        <div class="login-link">
          Already have an account? 
          <a href="#" (click)="$event.preventDefault(); navigateToLogin()" class="login-link-text">
            Sign in
          </a>
        </div>
      </div>
    </form>
  </div>
</div>
